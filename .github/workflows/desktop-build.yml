name: Desktop build (Mac + Windows)

on:
  workflow_dispatch: {}
  push:
    tags: ['desktop-v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: mac
          - platform: windows-latest
            name: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps (bundled as sidecar resources)
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop (Tauri CLI) deps
        working-directory: desktop
        run: npm ci

      - name: Fetch node sidecar runtime
        working-directory: desktop
        run: npm run fetch-node

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload macOS bundle
        if: matrix.name == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: webwing-mac
          path: |
            desktop/src-tauri/target/release/bundle/macos/*.app
            desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows bundle
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: webwing-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
